<script>
    document.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        
        // 1. Activer l'accès si retour de NowPayments (Abonnement)
        if (urlParams.get('status') === 'success') {
            const oneYear = 365 * 24 * 60 * 60 * 1000;
            const expiry = new Date().getTime() + oneYear;
            localStorage.setItem('manga_access_expiry', expiry);
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        // 2. Vérification STRICTE
        const expiry = localStorage.getItem('manga_access_expiry');
        const hasValidSub = expiry && Date.now() < parseInt(expiry);
        
        // On vérifie si la session Web3 a été validée par nft-gate.js
        const isNFTVerified = sessionStorage.getItem('nft_verified') === 'true';

        if (!hasValidSub && !isNFTVerified) {
            // Pas d'abonnement ET pas de NFT détecté -> DEHORS
            alert("Accès réservé aux abonnés ou détenteurs de NFT.");
            window.location.href = "index.html";
        }
    });
</script>

                <a href="{{ '/manga_jp.html' | relative_url }}" class="lang-icon active" >🇯🇵</a>
                <a href="{{ '/manga_en.html' | relative_url }}" class="lang-icon " >🇬🇧</a>
            </div>
