<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

    <!-- Theme : appliqué avant paint pour éviter le flash -->
    <script>
      (function(){
        var t = localStorage.getItem('otaku_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>

    <style>
      /* ── THEME GLOBAL ── */
      [data-theme="light"] body {
        filter: invert(1) hue-rotate(180deg);
        background: #fff;
      }
      /* Re-inversion pour les images/vidéos */
      [data-theme="light"] img,
      [data-theme="light"] video,
      [data-theme="light"] canvas,
      [data-theme="light"] iframe {
        filter: invert(1) hue-rotate(180deg);
      }

      /* ── BOUTON FLOTTANT ── */
      #theme-toggle {
        position: fixed;
        bottom: 24px;
        right: 20px;
        z-index: 9999;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: 2px solid rgba(0,242,255,0.4);
        background: rgba(0,0,0,0.7);
        backdrop-filter: blur(8px);
        font-size: 1.2rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
        box-shadow: 0 2px 12px rgba(0,0,0,0.4);
      }
      #theme-toggle:hover {
        border-color: #00f2ff;
        transform: scale(1.1);
        box-shadow: 0 0 14px rgba(0,242,255,0.3);
      }
      [data-theme="light"] #theme-toggle {
        filter: invert(1) hue-rotate(180deg);
      }
    </style>

    <script src="{{ '/assets/js/libs/ethers-6.15.0.min.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/nft-gate.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/auth-guard.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/theme.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/tableau-details.js' | relative_url }}"></script>
</head>
<body>
    <header>
        </header>

    <main>
        {{ content }} 
    </main>

    <footer>
        </footer>
</body>
</html>
